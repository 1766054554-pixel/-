 {q:"7. fork创建的子进程可以通过全局变量和父进程传递数据。",ans:false,why:"❌错。父子独立地址空间，互不影响。"},
 {q:"8. 管程比信号量更强大，能解决信号量不能解决的同步问题。",ans:false,why:"❌错。能力相同，管程只是更结构化安全。"},
];

const grid=document.getElementById('grid');
const stats=document.getElementById('stats');
let done=new Set();
let curFilter="全部";

// 模块筛选按钮
const modules=["全部",...new Set(cards.map(c=>c.m)),"🔴只看陷阱","🟡只看计算"];
const fbox=document.getElementById('filters');
modules.forEach(m=>{
  const b=document.createElement('button');
  b.textContent=m; if(m==="全部")b.classList.add('active');
  b.onclick=()=>{curFilter=m;document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
  fbox.appendChild(b);
});

function render(){
  grid.innerHTML='';
  cards.forEach((c,i)=>{
    if(curFilter!=="全部"){
      if(curFilter==="🔴只看陷阱"&&c.t!=="trap")return;
      else if(curFilter==="🟡只看计算"&&c.t!=="calc")return;
      else if(curFilter!=="🔴只看陷阱"&&curFilter!=="🟡只看计算"&&c.m!==curFilter)return;
    }
    const tagTxt=c.t==="trap"?"🔴陷阱":c.t==="calc"?"🟡计算":"🟢知识";
    const div=document.createElement('div');
    div.className='card'+(done.has(i)?' flipped done':'');
    div.innerHTML=`<div class="inner">
      <div class="front"><span class="mod">${c.m}</span><span class="tag">${tagTxt}</span>
        <div class="icon">${c.icon}</div><div class="q">${c.q}</div><div class="hint">点击翻转 👆</div></div>
      <div class="back ${c.t}"><div class="title">${c.title}</div><div class="body">${c.body}</div></div>
    </div>`;
    let flipped=done.has(i);
    div.onclick=()=>{
      if(!flipped){div.classList.add('flipped');flipped=true;}
      else if(!done.has(i)){done.add(i);div.classList.add('done');update();}
      else{done.delete(i);div.classList.remove('flipped','done');flipped=false;update();}
    };
    grid.appendChild(div);
  });
}
function update(){stats.textContent=`已掌握 ${done.size} / ${cards.length} 张 ${done.size===cards.length?'🎉全掌握啦!':''}`;}
function flipAll(f){document.querySelectorAll('.card').forEach(c=>c.classList.toggle('flipped',f));}
function resetAll(){done.clear();render();update();}

// 判断题渲染
const qbox=document.getElementById('quizbox');
quiz.forEach((item,i)=>{
  const d=document.createElement('div');d.className='qitem';
  d.innerHTML=`<div class="qt">${item.q}</div>
    <button onclick="judge(${i},true,this)">✔ 对</button>
    <button onclick="judge(${i},false,this)">✘ 错</button>
    <div class="ans" id="ans${i}">${item.why}</div>`;
  qbox.appendChild(d);
});
function judge(i,choice,btn){
  const correct=quiz[i].ans===choice;
  btn.classList.add(correct?'right':'wrong');
  document.getElementById('ans'+i).style.display='block';
}

render();update();
</script>
</body>
</html>
